name: run-tests

on:
  push:
    paths:
      - '**.php'
      - '.github/workflows/run-tests.yml'
      - '.gitattributes'
      - 'phpunit.xml.dist'
      - 'composer.json'
      - 'composer.lock'
      - 'tests/fixtures/**'
  pull_request:
    paths:
      - '**.php'
      - '.github/workflows/run-tests.yml'
      - '.gitattributes'
      - 'phpunit.xml.dist'
      - 'composer.json'
      - 'composer.lock'
      - 'tests/fixtures/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest]
        php: [8.5, 8.4, 8.3]
        laravel: [13.*, 12.*]
        stability: [prefer-lowest, prefer-stable]
        include:
          - laravel: 13.*
            testbench: 11.*
          - laravel: 12.*
            testbench: 10.*

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.stability }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: List Installed Dependencies
        run: composer show -D

      - name: Execute tests
        run: vendor/bin/pest --ci

  pgvector:
    name: pgvector integration (Postgres + vector)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, pdo_pgsql, bcmath, intl, fileinfo
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@v4

      - name: Run native pgvector tests against a real Postgres
        env:
          RAG_PGVECTOR_TEST: '1'
          RAG_PGVECTOR_TEST_HOST: 127.0.0.1
          RAG_PGVECTOR_TEST_PORT: '5432'
          RAG_PGVECTOR_TEST_DB: rag
          RAG_PGVECTOR_TEST_USER: postgres
          RAG_PGVECTOR_TEST_PASSWORD: postgres
        run: vendor/bin/pest tests/Feature/VectorStore/PgVectorStoreTest.php --ci
